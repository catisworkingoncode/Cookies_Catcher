<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cookie Catcher</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="game-shell">
    <header class="game-header">
      <div class="brand-card">
        <div class="mascot" aria-hidden="true">🧺</div>
        <div>
          <h1>Cookie Catcher</h1>
          <p>Catch treats, dodge trouble.</p>
        </div>
      </div>

      <div class="stats">
        <span><em>⭐</em> Score <strong id="score">0</strong></span>
        <span><em>🏆</em> Level <strong id="level">1</strong></span>
        <span><em>💖</em> Lives <strong id="lives">3</strong></span>
        <span><em>🥇</em> Best <strong id="highScore">0</strong></span>
      </div>

      <button class="pause-button" id="pauseButton" type="button" aria-label="Pause game">⏸</button>
    </header>

    <section class="game-area" id="gameArea" aria-label="Cookie Catcher game area">
      <div class="screen-message" id="startScreen">
        <div class="message-card">
          <div class="treat-row" aria-hidden="true">🧋 🍔 🍪</div>
          <h2>Ready?</h2>
          <div class="control-chips" aria-hidden="true">
            <span>←</span>
            <span>→</span>
          </div>
          <button class="primary-button" id="startButton" type="button">Start</button>
        </div>
      </div>

      <div class="screen-message hidden" id="gameOverScreen">
        <div class="message-card">
          <div class="treat-row" aria-hidden="true">💣 🦠 🔥</div>
          <h2>Game Over</h2>
          <p>Score <strong id="finalScore">0</strong></p>
          <button class="primary-button" id="restartButton" type="button">Play Again</button>
        </div>
      </div>

      <div class="screen-message hidden" id="pauseScreen">
        <div class="pause-card">
          <button class="close-button" id="closePauseButton" type="button" aria-label="Close pause menu">×</button>
          <div class="toy-cluster" aria-hidden="true">🪁 🧸 🪀</div>
          <h2>Pause</h2>

          <div class="settings-panel">
            <div class="setting-row">
              <span class="setting-icon" aria-hidden="true">🎵</span>
              <input class="volume-slider" id="volumeSlider" type="range" min="0" max="100" value="70" aria-label="Volume">
            </div>
            <div class="setting-row">
              <span class="setting-icon" aria-hidden="true">🔊</span>
              <button class="toggle-button is-on" id="soundToggleButton" type="button">ON</button>
            </div>
          </div>

          <div class="pause-actions">
            <button class="home-button" id="pauseRestartButton" type="button" aria-label="Restart game">⌂</button>
            <button class="primary-button resume-button" id="resumeButton" type="button">Resume</button>
          </div>
        </div>
      </div>

      <div class="basket" id="basket" aria-hidden="true">
        <div class="basket-rim"></div>
        <div class="basket-bowl"></div>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
